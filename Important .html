<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Camera Access</title>

<style>
body{
  background:black;
  color:#00ff00;
  text-align:center;
  font-family: Arial, "Segoe UI Emoji", "Noto Color Emoji", "Apple Color Emoji", sans-serif;
}

h1{
  margin-top:50px;
}

#rec{
  color:red;
  font-size:30px;
  animation: blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0;}
  100%{opacity:1;}
}

input{
  padding:10px;
  font-size:16px;
}

button{
  padding:10px 20px;
  font-size:16px;
  margin-top:10px;
}
</style>

</head>

<body>

<div id="start">
  <h2>Enter Your Name 😎</h2>
  <input type="text" id="name" placeholder="Your Name">
  <br>
  <button onclick="startPrank()">Start 🚀</button>
</div>

<div id="prank" style="display:none;">
  <h1 id="title"></h1>
  <h2 id="rec">🔴 REC</h2>
  <p id="status">Initializing 📷...</p>
</div>

<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>

function startPrank(){

  let name = document.getElementById("name").value;

  if(name === ""){
    alert("Enter name first 😅");
    return;
  }

  document.getElementById("start").style.display = "none";
  document.getElementById("prank").style.display = "block";

  document.getElementById("title").innerText = "📷 " + name + "'s Camera Accessed 😱";

  // Fullscreen (optional)
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  }

  // Play sound
  document.getElementById("beep").play();

  let steps = [
    "Scanning face 👀...",
    "Capturing image 📸...",
    "Uploading data 📤...",
    "Tracking location 📍...",
    "Sending to server 🌐..."
  ];

  let i = 0;

  let interval = setInterval(() => {
    if(i < steps.length){
      document.getElementById("status").innerText = steps[i];
      i++;
    } else {
      clearInterval(interval);
      document.getElementById("status").innerText = "😂 APRIL FOOL " + name + "!";
    }
  }, 1500);
}

</script>

</body>
</html>
